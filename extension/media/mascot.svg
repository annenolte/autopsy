<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -8 200 236" width="200" height="236">
  <!-- Autopsy Vulture Mascot — animated vulture detective with magnifying glass -->

  <!-- Outer group: gentle hovering bob -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0;0,-6;0,0" keyTimes="0;0.5;1"
      dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>

    <!-- Body — dark feathered -->
    <ellipse cx="100" cy="135" rx="48" ry="45" fill="#2a2a2a"/>

    <!-- Belly — lighter chest tuft -->
    <ellipse cx="100" cy="140" rx="30" ry="28" fill="#4a4040"/>

    <!-- Feather texture on chest -->
    <path d="M82 125 Q90 130 82 135" fill="none" stroke="#5a5050" stroke-width="1"/>
    <path d="M88 120 Q96 125 88 130" fill="none" stroke="#5a5050" stroke-width="1"/>
    <path d="M112 125 Q104 130 112 135" fill="none" stroke="#5a5050" stroke-width="1"/>
    <path d="M106 120 Q98 125 106 130" fill="none" stroke="#5a5050" stroke-width="1"/>

    <!-- Neck — bare/wrinkly pink (classic vulture) -->
    <ellipse cx="100" cy="90" rx="14" ry="18" fill="#d4918a"/>

    <!-- Neck wrinkle lines -->
    <path d="M90 85 Q100 82 110 85" fill="none" stroke="#c07a73" stroke-width="1"/>
    <path d="M91 90 Q100 87 109 90" fill="none" stroke="#c07a73" stroke-width="1"/>

    <!-- Head — bald with slight fuzz -->
    <circle cx="100" cy="62" r="28" fill="#d4918a"/>

    <!-- Fuzz on top of head -->
    <path d="M88 40 Q90 32 94 38" fill="#555" stroke="#555" stroke-width="1.5"/>
    <path d="M96 38 Q100 30 104 38" fill="#555" stroke="#555" stroke-width="1.5"/>
    <path d="M106 40 Q110 32 112 38" fill="#555" stroke="#555" stroke-width="1.5"/>

    <!-- Eye whites — big cute eyes -->
    <ellipse cx="88" cy="58" rx="11" ry="12" fill="white"/>
    <ellipse cx="112" cy="58" rx="11" ry="12" fill="white"/>

    <!-- Pupils — sharp investigator look, with subtle dart animation -->
    <circle cx="91" cy="57" r="6.5" fill="#1a1a1a">
      <animate attributeName="cx" values="91;89;91;93;91" keyTimes="0;0.25;0.5;0.75;1"
        dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="115" cy="57" r="6.5" fill="#1a1a1a">
      <animate attributeName="cx" values="115;113;115;117;115" keyTimes="0;0.25;0.5;0.75;1"
        dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- Eye shine -->
    <circle cx="93" cy="54" r="2.5" fill="white">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="93;91;93;95;93" keyTimes="0;0.25;0.5;0.75;1"
        dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="117" cy="54" r="2.5" fill="white">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="117;115;117;119;117" keyTimes="0;0.25;0.5;0.75;1"
        dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- Blink animation — eyelids that close periodically -->
    <ellipse cx="88" cy="58" rx="11" ry="0" fill="#d4918a">
      <animate attributeName="ry" values="0;0;12;0;0" keyTimes="0;0.42;0.46;0.50;1"
        dur="3.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="112" cy="58" rx="11" ry="0" fill="#d4918a">
      <animate attributeName="ry" values="0;0;12;0;0" keyTimes="0;0.42;0.46;0.50;1"
        dur="3.5s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Eyebrows — slightly furrowed, focused -->
    <line x1="78" y1="46" x2="92" y2="48" stroke="#3a2020" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="108" y1="48" x2="122" y2="46" stroke="#3a2020" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Beak — hooked vulture beak -->
    <path d="M95 65 L100 68 L105 65 L102 75 Q100 80 98 75 Z" fill="#f4a030"/>
    <!-- Hook tip -->
    <path d="M98 75 Q100 82 97 79" fill="#e08a10" stroke="#e08a10" stroke-width="1"/>

    <!-- Neck ruff / collar — fluffy feather collar -->
    <path d="M70 100 Q75 92 82 98 Q88 90 95 98 Q100 92 105 98 Q112 90 118 98 Q125 92 130 100"
          fill="none" stroke="#3a3a3a" stroke-width="4" stroke-linecap="round"/>
    <path d="M72 102 Q78 95 84 100 Q90 93 97 100 Q102 95 107 100 Q114 93 120 100 Q126 95 128 102"
          fill="#3a3a3a" stroke="none"/>

    <!-- Left wing — animated flapping -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="12,75,110;-8,75,110;12,75,110" keyTimes="0;0.5;1"
        dur="0.8s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <ellipse cx="55" cy="128" rx="22" ry="35" fill="#1a1a1a"/>
      <!-- Wing feather detail -->
      <path d="M40 140 Q45 135 42 145" fill="none" stroke="#333" stroke-width="1.5"/>
      <path d="M44 148 Q49 143 46 153" fill="none" stroke="#333" stroke-width="1.5"/>
      <!-- Extra feather tips -->
      <path d="M36 150 Q40 146 38 155" fill="none" stroke="#333" stroke-width="1.2"/>
      <path d="M34 135 Q38 130 36 140" fill="none" stroke="#333" stroke-width="1.2"/>
    </g>

    <!-- Right wing — animated flapping (mirrored) -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="-12,125,110;8,125,110;-12,125,110" keyTimes="0;0.5;1"
        dur="0.8s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <ellipse cx="145" cy="128" rx="22" ry="35" fill="#1a1a1a"/>
      <!-- Wing feather detail -->
      <path d="M160 140 Q155 135 158 145" fill="none" stroke="#333" stroke-width="1.5"/>
      <path d="M156 148 Q151 143 154 153" fill="none" stroke="#333" stroke-width="1.5"/>
      <!-- Extra feather tips -->
      <path d="M164 150 Q160 146 162 155" fill="none" stroke="#333" stroke-width="1.2"/>
      <path d="M166 135 Q162 130 164 140" fill="none" stroke="#333" stroke-width="1.2"/>
    </g>

    <!-- Tail feathers — scraggly with subtle wag -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0,85,175;-3,85,175;0,85,175;3,85,175;0,85,175"
        keyTimes="0;0.25;0.5;0.75;1"
        dur="3s" repeatCount="indefinite"/>
      <path d="M78 175 Q68 195 55 200" stroke="#1a1a1a" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M84 177 Q76 198 66 205" stroke="#1a1a1a" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M90 178 Q84 196 78 203" stroke="#2a2a2a" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Feet — gnarly talons -->
    <g fill="none" stroke="#888866" stroke-width="3" stroke-linecap="round">
      <path d="M85 178 L78 192 L70 196"/>
      <path d="M78 192 L76 199"/>
      <path d="M78 192 L84 197"/>
      <path d="M115 178 L122 192 L130 196"/>
      <path d="M122 192 L124 199"/>
      <path d="M122 192 L116 197"/>
    </g>

    <!-- Magnifying glass held in right wing — bobs with the wing -->
    <g transform="translate(152, 100) rotate(25)">
      <animateTransform attributeName="transform" type="translate"
        values="0,0;2,-3;0,0;-2,3;0,0" keyTimes="0;0.25;0.5;0.75;1"
        dur="0.8s" repeatCount="indefinite" additive="sum"/>
      <circle cx="0" cy="0" r="16" fill="none" stroke="#7eb8da" stroke-width="4"/>
      <circle cx="0" cy="0" r="12" fill="rgba(126, 184, 218, 0.12)"/>
      <line x1="11" y1="11" x2="26" y2="26" stroke="#7eb8da" stroke-width="4" stroke-linecap="round"/>
      <!-- Glint — pulsing -->
      <path d="M-6 -8 Q-2 -12 2 -8" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
      </path>
      <!-- Scan lines inside glass -->
      <line x1="-8" y1="-2" x2="8" y2="-2" stroke="rgba(126,184,218,0.3)" stroke-width="1">
        <animate attributeName="y1" values="-8;8;-8" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="-8;8;-8" dur="2s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- Code brackets badge on belly -->
    <text x="91" y="148" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.35)" font-weight="bold">&lt;/&gt;</text>
  </g>
</svg>
